<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>養殖場</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#020304;display:flex;align-items:center;justify-content:center;overflow:hidden}
#game{width:min(900px,100vw);height:min(560px,100vh);position:relative;overflow:hidden;background:#020304}
/* ── NOVEL ── */
.scr-novel{position:absolute;inset:0;display:none;flex-direction:column;justify-content:flex-end;
  font-family:'Noto Serif JP',serif;cursor:default;transition:opacity .5s}
.nov-bg{position:absolute;inset:0;transition:background .7s ease}
.nov-scanline{position:absolute;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.05) 3px,rgba(0,0,0,.05) 4px)}
.nov-chars{position:absolute;inset:0;pointer-events:none;z-index:2}
.nov-char{position:absolute;bottom:0;width:200px;height:400px;transform:translateX(-50%);transition:opacity .42s}
.nov-ui{position:relative;z-index:10;padding:0 0 14px}
.nov-box{margin:0 28px 9px;background:rgba(4,9,22,.9);border:1px solid rgba(74,143,181,.15);
  border-radius:2px;padding:14px 18px 18px;min-height:100px;position:relative;
  backdrop-filter:blur(6px);box-shadow:0 0 40px rgba(0,30,80,.25);transition:opacity .2s}
.nov-box::before{content:'';position:absolute;top:-1px;left:16px;right:16px;height:1px;
  background:linear-gradient(90deg,transparent,rgba(74,143,181,.35),transparent)}
.nov-name{font-size:13px;font-weight:700;letter-spacing:.12em;margin-bottom:6px;text-shadow:0 0 12px currentColor;min-height:17px}
.nov-text{font-size:15px;line-height:1.9;color:#cde3f0;letter-spacing:.04em;min-height:54px}
.nov-arrow{position:absolute;right:14px;bottom:8px;color:rgba(120,180,220,.5);font-size:10px;
  opacity:0;transition:opacity .3s;animation:vbounce 1.1s ease-in-out infinite}
@keyframes vbounce{0%,100%{transform:translateY(0)}50%{transform:translateY(3px)}}
.nov-choices{display:none;flex-direction:column;align-items:center;gap:7px;padding:4px 28px 0;margin-bottom:5px}
.nov-choice{width:100%;max-width:500px;padding:11px 18px;background:rgba(5,11,26,.92);
  border:1px solid rgba(74,143,181,.26);border-radius:2px;color:#a0c8de;
  font-family:'Noto Serif JP',serif;font-size:14px;letter-spacing:.05em;cursor:pointer;
  animation:choicein .34s both;transition:background .17s,border-color .17s,color .17s,transform .17s}
.nov-choice:hover{background:rgba(15,38,88,.9);border-color:rgba(74,158,222,.52);color:#d4eeff;transform:translateY(-2px)}
@keyframes choicein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.nov-ctrl{display:flex;justify-content:flex-end;gap:4px;padding:0 30px}
.nov-btn{padding:3px 9px;background:rgba(4,10,24,.6);border:1px solid rgba(74,120,160,.17);
  border-radius:2px;color:rgba(100,148,182,.5);font-size:9px;font-family:inherit;
  letter-spacing:.12em;cursor:pointer;transition:color .16s,border-color .16s}
.nov-btn:hover{color:#80b8d8;border-color:rgba(74,143,181,.42)}
.nov-btn.on{color:#4ab0e8;border-color:rgba(74,158,230,.52);background:rgba(16,56,116,.48)}
/* input overlay */
.nov-input-ov{position:absolute;inset:0;z-index:20;display:flex;align-items:center;justify-content:center;
  background:rgba(2,4,12,.9);backdrop-filter:blur(8px)}
.nov-input-box{text-align:center;padding:30px 38px;border:1px solid rgba(74,143,181,.2);
  border-radius:2px;background:rgba(4,10,24,.92);max-width:400px;width:90%}
.nov-input-lbl{color:rgba(160,195,220,.7);font-size:13px;line-height:1.8;margin-bottom:18px;white-space:pre-wrap;letter-spacing:.04em}
.nov-input-f{width:100%;background:transparent;border:none;border-bottom:1px solid rgba(74,143,181,.35);
  color:#c8e2f0;font-family:'Noto Serif JP',serif;font-size:16px;padding:8px 4px;outline:none;
  text-align:center;letter-spacing:.08em}
.nov-input-f::placeholder{color:rgba(100,140,165,.4)}
.nov-input-hint{color:rgba(100,140,165,.45);font-size:11px;margin-top:10px;letter-spacing:.1em;cursor:pointer}
/* history panel */
.nov-hist-panel{position:absolute;inset:0;z-index:80;background:rgba(2,5,14,.97);
  display:none;flex-direction:column;backdrop-filter:blur(8px)}
.nov-hist-head{display:flex;justify-content:space-between;align-items:center;
  padding:12px 18px;border-bottom:1px solid rgba(74,120,160,.14);
  color:rgba(130,172,200,.75);font-size:12px;letter-spacing:.12em}
.nov-hist-x{background:none;border:none;color:rgba(90,124,152,.55);font-size:14px;cursor:pointer;padding:2px 4px}
.nov-hist-x:hover{color:#90c0da}
.nov-hist-body{flex:1;overflow-y:auto;padding:12px 18px;display:flex;flex-direction:column;gap:8px}
.nov-hist-entry{color:rgba(182,208,225,.8);font-size:13px;line-height:1.72;
  border-bottom:1px solid rgba(36,58,92,.18);padding-bottom:7px}
.nov-hist-nm{display:block;font-size:10.5px;letter-spacing:.1em;opacity:.58;margin-bottom:2px}
.nov-hist-body::-webkit-scrollbar{width:3px}
.nov-hist-body::-webkit-scrollbar-thumb{background:rgba(74,120,160,.28);border-radius:2px}
/* title */
.nov-title{position:absolute;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 38%,#0c1a30 0%,#050a18 55%,#020406 100%);transition:opacity .6s}
.nov-title-inner{text-align:center}
.nov-title-ey{color:rgba(74,143,181,.42);font-size:10px;letter-spacing:.42em;margin-bottom:14px;
  font-family:'Share Tech Mono',monospace}
.nov-title-h{color:#bcd8ec;font-size:clamp(22px,3.8vw,36px);font-weight:700;letter-spacing:.08em;
  text-shadow:0 0 44px rgba(74,143,181,.3);margin:0 0 10px;line-height:1.45}
.nov-title-sub{color:rgba(150,185,210,.38);font-size:11px;letter-spacing:.18em;margin:0 0 34px}
.nov-title-start{padding:10px 40px;background:transparent;border:1px solid rgba(74,143,181,.35);
  border-radius:2px;color:rgba(148,192,222,.65);font-family:'Noto Serif JP',serif;
  font-size:11px;letter-spacing:.28em;cursor:pointer;transition:all .24s}
.nov-title-start:hover{background:rgba(74,143,181,.1);border-color:rgba(74,180,232,.55);color:#c4e4ff}
.nov-end-lbl{color:rgba(110,152,182,.35);font-size:17px;letter-spacing:.3em}
/* fade overlay */
.fade-ov{position:absolute;inset:0;z-index:200;background:#020304;opacity:0;pointer-events:none;transition:opacity .45s}
/* ── CULTIVATION ── */
.scr-cult{position:absolute;inset:0;display:none;flex-direction:column;
  font-family:'Share Tech Mono','Courier New',monospace;background:#060c10;color:#4a7a5a;transition:opacity .5s}
.cult-hdr{background:#070e12;border-bottom:1px solid #0c1c14;
  padding:6px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.cult-sys{color:#1a4828;font-size:9.5px;letter-spacing:.18em;flex-shrink:0}
.cult-wbar{flex:1;height:3px;background:#0a1610;border-radius:1px;overflow:hidden}
.cult-wfill{height:100%;background:#163820;transition:width .4s}
.cult-wlbl{color:#244830;font-size:9.5px;letter-spacing:.1em;flex-shrink:0}
.cult-main{flex:1;display:flex;overflow:hidden;min-height:0}
.cult-left{width:210px;flex-shrink:0;border-right:1px solid #0c1c14;
  display:flex;flex-direction:column;padding:10px 11px;gap:8px;overflow:hidden}
.cult-uid{color:#1a4828;font-size:9px;letter-spacing:.16em;padding-bottom:5px;border-bottom:1px solid #0a1a0e}
.cult-nick{color:#267040;font-size:10.5px;letter-spacing:.1em;min-height:15px}
.cult-sil{width:86px;height:144px;margin:3px auto;opacity:.72}
.cult-stats{display:flex;flex-direction:column;gap:4px;flex:1}
.srow{display:flex;align-items:center;gap:0}
.slbl{width:56px;font-size:8px;color:#244030;letter-spacing:.04em;flex-shrink:0}
.sbar{flex:1;height:4px;background:#0a1610;border-radius:1px;overflow:hidden;margin:0 3px}
.sfill{height:100%;border-radius:1px;transition:width .4s}
.sfill.cog{background:#1e5090}
.sfill.end{background:#903020}
.sfill.emp{background:#902860}
.sfill.com{background:#305040}
.sfill.soc{background:#288048}
.sfill.bon{background:#706818}
.sval{width:18px;font-size:8px;color:#305838;text-align:right}
.cult-pred{font-size:8px;color:#1a3820;letter-spacing:.07em;border-top:1px solid #0a1a0e;padding-top:5px;min-height:18px}
.cult-right{flex:1;display:flex;flex-direction:column;padding:9px 11px;gap:7px;overflow:hidden}
.cult-ahdr{display:flex;justify-content:space-between;align-items:center}
.cult-atitle{color:#1a4828;font-size:9px;letter-spacing:.16em}
.cult-ap{color:#267040;font-size:9.5px;letter-spacing:.1em}
.cult-acts{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.cact{background:#070d11;border:1px solid #0c1c14;border-radius:2px;
  padding:6px 9px;cursor:pointer;text-align:left;transition:background .14s,border-color .14s}
.cact:hover:not(:disabled){background:#0a1516;border-color:#12281a}
.cact:disabled{opacity:.3;cursor:not-allowed}
.cact-top{display:flex;justify-content:space-between;align-items:baseline}
.cact-nm{font-size:10.5px;color:#306040;letter-spacing:.06em}
.cact-cd{font-size:8px;color:#162c1e;letter-spacing:.1em}
.cact-ds{font-size:8.5px;color:#1a3824;letter-spacing:.03em;margin-top:1px}
.cact-ef{font-size:8px;color:#1c3820;letter-spacing:.03em;margin-top:1px}
.cult-log{flex:1;border-top:1px solid #0a1a0e;overflow-y:auto;padding-top:7px;min-height:0}
.cult-log-t{font-size:8px;color:#163420;letter-spacing:.16em;margin-bottom:3px}
.cult-log-e{font-size:8.5px;color:#1a3820;letter-spacing:.03em;line-height:1.55;padding:1px 0}
.cult-log-e.hi{color:#267040}
.cult-log::-webkit-scrollbar{width:2px}
.cult-nw{margin:6px 11px 8px;padding:6px;background:transparent;border:1px solid #123018;
  border-radius:2px;color:#267040;font-family:inherit;font-size:9.5px;letter-spacing:.16em;
  cursor:pointer;transition:all .17s;display:none}
.cult-nw:hover{background:#0a1a10;border-color:#1c4228;color:#38905a}
/* mini-novel overlay (inside cultivation) */
.mnov{position:absolute;inset:0;z-index:60;background:rgba(2,5,10,.93);
  backdrop-filter:blur(4px);display:none;flex-direction:column;justify-content:flex-end}
.mnov-tag{position:absolute;top:11px;left:11px;
  font-family:'Share Tech Mono',monospace;font-size:8.5px;color:rgba(74,143,181,.36);letter-spacing:.2em}
</style>
</head>
<body>
<div id="game"></div>
<script>
(function(){'use strict';
// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
const GS={
  phase:null,
  nSteps:[],nIdx:0,nOnEnd:null,
  auto:false,skip:false,typing:false,waiting:false,curText:'',
  history:[],
  talkIdx:0,
  week:1,actLeft:2,cultPhase:1,
  eventsDone:new Set(),
  unit:{id:'J-7',nickname:'',stats:{cog:3,end:3,emp:3,com:5,soc:3},bond:0},
  classification:null
};

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
const $ = sel => document.querySelector('#game').querySelector(sel);
const $$ = () => document.querySelector('#game');
function uname(){ return GS.unit.nickname||'J-7'; }
function ut(v){ return typeof v==='function'?v(GS):v; }

function classify(){
  const s=GS.unit.stats,b=GS.unit.bond;
  if(s.end>=15&&s.emp<=5) return 'M';
  if(s.cog>=15) return 'R';
  if(s.end>=12) return 'L';
  if(s.emp>=11&&s.soc>=9&&s.com>=10) return 'P';
  if(s.emp>=11&&s.soc>=10) return 'C';
  if(s.cog>=9) return 'E';
  return 'L';
}
function getPred(){
  const s=GS.unit.stats;
  if(s.end>=14&&s.emp<=6) return 'M系（医療）有力';
  if(s.cog>=13) return 'R系（研究）有力';
  if(s.emp>=9&&s.soc>=7&&s.com>=9) return 'P系（愛玩）有力';
  if(s.emp>=9&&s.soc>=8) return 'C系（愛護）有力';
  if(s.end>=10) return 'L系（労働）有力';
  if(s.cog>=7) return 'E系（教育）有力';
  return 'データ蓄積中';
}

// ═══════════════════════════════════════════
//  SILHOUETTES
// ═══════════════════════════════════════════
function makeSil(c,w,h){
  const id='sg'+Math.random().toString(36).slice(2,7);
  const vb=w===86?'0 0 86 144':'0 0 160 380';
  const e=w===86
    ?'<ellipse cx="43" cy="19" rx="13" ry="15" fill="url(#'+id+')" /><rect x="36" y="31" width="14" height="10" fill="url(#'+id+')" /><path d="M14 41 Q31 36 43 37 Q55 36 72 41 L76 110 Q56 118 43 116 Q30 118 10 110 Z" fill="url(#'+id+')" /><path d="M13 43 Q2 70 1 102 Q10 105 18 102 Q23 74 33 51 Z" fill="url(#'+id+')" /><path d="M73 43 Q84 70 85 102 Q76 105 68 102 Q63 74 53 51 Z" fill="url(#'+id+')" /><path d="M20 108 Q17 130 16 144 L40 144 Q42 130 40 108 Z" fill="url(#'+id+')" /><path d="M46 108 Q44 130 46 144 L70 144 Q68 130 66 108 Z" fill="url(#'+id+')" />'
    :'<ellipse cx="80" cy="50" rx="30" ry="36" fill="url(#'+id+')" /><rect x="67" y="80" width="26" height="18" fill="url(#'+id+')" /><path d="M28 98 Q52 92 80 94 Q108 92 132 98 L140 270 Q106 282 80 280 Q54 282 20 270 Z" fill="url(#'+id+')" /><path d="M29 104 Q7 158 5 238 Q20 242 32 238 Q42 168 55 116 Z" fill="url(#'+id+')" /><path d="M131 104 Q153 158 155 238 Q140 242 128 238 Q118 168 105 116 Z" fill="url(#'+id+')" /><path d="M38 265 Q34 320 32 380 L68 380 Q71 320 68 265 Z" fill="url(#'+id+')" /><path d="M92 265 Q89 320 91 380 L128 380 Q126 320 122 265 Z" fill="url(#'+id+')" />';
  return '<svg viewBox="'+vb+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">'
    +'<defs><linearGradient id="'+id+'" x1="0" y1="0" x2="0" y2="1">'
    +'<stop offset="0%" stop-color="'+c+'" stop-opacity=".9"/>'
    +'<stop offset="100%" stop-color="'+c+'" stop-opacity=".16"/>'
    +'</linearGradient></defs>'+e+'</svg>';
}

// ═══════════════════════════════════════════
//  CHARACTERS
// ═══════════════════════════════════════════
const CHARS={
  narr:  {name:'',   color:'#7a9eb8'},
  sys:   {name:'[ SYSTEM ]', color:'#3a9fd4'},
  j7:    {name:()=>uname(), color:'#7ec8e0', sil:'#2060a0'},
  j7p:   {name:()=>uname(), color:'#e8b4c4', sil:'#8a3060'},  // companion coloring
  proto: {name:'', color:'#8ab88a'},
  sup:   {name:'ヴァルター管理官', color:'#c8a860', sil:'#5a4020'},
  kido:  {name:'城戸先輩', color:'#b09080', sil:'#5a3a28'},
};
function charName(id){ const c=CHARS[id]; if(!c)return''; return typeof c.name==='function'?c.name():c.name; }

// ═══════════════════════════════════════════
//  BACKGROUNDS
// ═══════════════════════════════════════════
const BG={
  black:  '#000000',
  fac:    'linear-gradient(180deg,#0a1620 0%,#10202e 50%,#0a1620 100%)',
  fac_d:  'linear-gradient(180deg,#0c1828 0%,#162434 40%,#1e3040 100%)',
  fac_n:  'linear-gradient(180deg,#060c14 0%,#0c1420 100%)',
  city:   'radial-gradient(ellipse at 50% 60%,#0e1830 0%,#060c1e 45%,#020508 100%)',
  warm:   'linear-gradient(155deg,#1a1008 0%,#2a1c0e 40%,#1a1008 100%)',
  lab:    'linear-gradient(180deg,#08080e 0%,#0c0c14 50%,#08080e 100%)',
  club:   'radial-gradient(ellipse at 50% 50%,#200818 0%,#0e0410 60%,#040208 100%)',
};

// ═══════════════════════════════════════════
//  NOVEL ENGINE
// ═══════════════════════════════════════════
const NV={
  _typeT:null,_autoT:null,

  init(){
    const g=$$();
    // novel screen
    const sc=document.createElement('div');
    sc.className='scr-novel'; sc.id='scr-novel';
    sc.innerHTML=
      '<div class="nov-bg" id="nbg"></div>'+
      '<div class="nov-scanline"></div>'+
      '<div class="nov-chars" id="nchars"></div>'+
      '<div class="nov-ui">'+
        '<div class="nov-box" id="nbox">'+
          '<div class="nov-name" id="nname"></div>'+
          '<div class="nov-text" id="ntext"></div>'+
          '<div class="nov-arrow" id="narr">▼</div>'+
        '</div>'+
        '<div class="nov-choices" id="nchoices"></div>'+
        '<div class="nov-ctrl">'+
          '<button class="nov-btn" id="nb-auto">AUTO</button>'+
          '<button class="nov-btn" id="nb-skip">SKIP</button>'+
          '<button class="nov-btn" id="nb-log">LOG</button>'+
        '</div>'+
      '</div>'+
      '<div class="nov-hist-panel" id="nhist">'+
        '<div class="nov-hist-head"><span>テキスト履歴</span><button class="nov-hist-x" id="nhistx">✕</button></div>'+
        '<div class="nov-hist-body" id="nhistbody"></div>'+
      '</div>'+
      '<div class="fade-ov" id="fov"></div>';
    g.appendChild(sc);

    sc.querySelector('.nov-ui').addEventListener('click',e=>{
      if(e.target.closest('.nov-ctrl,.nov-choices,.nov-btn'))return;
      NV.advance();
    });
    sc.querySelector('#nb-auto').addEventListener('click',()=>NV.toggleAuto());
    sc.querySelector('#nb-skip').addEventListener('click',()=>NV.toggleSkip());
    sc.querySelector('#nb-log').addEventListener('click',()=>NV.showLog());
    sc.querySelector('#nhistx').addEventListener('click',()=>{ $('#nhist').style.display='none'; });
    document.addEventListener('keydown',e=>{
      if(!$('#scr-novel')||$('#scr-novel').style.display==='none')return;
      if(e.key===' '||e.key==='Enter'){e.preventDefault();NV.advance();}
      if(e.key==='l'||e.key==='L')NV.showLog();
      if(e.key==='Escape'){$('#nhist').style.display='none';}
    });
  },

  run(steps,onEnd){
    GS.nSteps=steps; GS.nIdx=0; GS.nOnEnd=onEnd||null;
    GS.auto=false; GS.skip=false; GS.history=[];
    const sc=$('#scr-novel');
    sc.style.display='flex';
    setTimeout(()=>sc.style.opacity='1',10);
    const cs=$('#scr-cult');
    if(cs){cs.style.opacity='0';setTimeout(()=>cs.style.display='none',500);}
    this.step();
  },

  step(){
    const steps=GS.nSteps;
    if(GS.nIdx>=steps.length){ if(GS.nOnEnd)GS.nOnEnd(); return; }
    const s=steps[GS.nIdx];
    const next=()=>{GS.nIdx++;NV.step();};

    switch(s.type){
      case 'bg':    $('#nbg').style.background=BG[s.v]||s.v; next(); break;
      case 'char':  this.setChar(s.id,s.pos); next(); break;
      case 'clr':   $('#nchars').innerHTML=''; next(); break;
      case 'n':     this.showText(null, ut(s.t)); break;
      case 'd':     this.showText(s.c, ut(s.t)); break;
      case 'ch':    this.showChoice(s.opts); break;
      case 'inp':   this.showInput(s); break;
      case 'lbl':   next(); break;
      case 'jmp': {
        const idx=GS.nSteps.findIndex(x=>x.type==='lbl'&&x.id===s.id);
        if(idx>=0)GS.nIdx=idx; next(); break;
      }
      case 'set':   GS.unit.stats[s.k]=Math.min(20,Math.max(0,(GS.unit.stats[s.k]||0)+s.v)); next(); break;
      case 'setb':  GS.unit.bond=Math.min(20,Math.max(0,GS.unit.bond+s.v)); next(); break;
      case 'classify': GS.classification=classify(); next(); break;
      case 'to_cult': this.toCult(s.ph); break;
      case 'to_route': this.toRoute('end_'+GS.classification); break;
      default: next();
    }
  },

  setChar(id,pos){
    const layer=$('#nchars'); if(!layer)return;
    const old=layer.querySelector('[data-pos="'+pos+'"]'); if(old)old.remove();
    if(id==='none')return;
    const ch=CHARS[id]; if(!ch)return;
    const el=document.createElement('div');
    el.className='nov-char'; el.dataset.pos=pos;
    el.style.left=({left:'13%',center:'50%',right:'74%'})[pos]||pos;
    el.style.opacity='0';
    el.innerHTML=makeSil(ch.sil||'#4a6880',160,380);
    layer.appendChild(el);
    requestAnimationFrame(()=>el.style.opacity='1');
  },

  showText(charId,text){
    const ch=charId?CHARS[charId]:null;
    const nn=$('#nname'),nt=$('#ntext'),ar=$('#narr');
    if(!nn||!nt)return;
    const name=ch?charName(charId):'';
    const color=ch?ch.color:'';
    if(name){nn.textContent=name;nn.style.color=color;}
    else{nn.textContent='';nn.style.color='';}
    GS.history.push({name,text});
    nt.textContent=''; ar.style.opacity='0';
    GS.typing=true; GS.waiting=false; GS.curText=text;
    let i=0;
    const tick=()=>{
      if(i<text.length){
        nt.textContent=text.slice(0,++i);
        NV._typeT=setTimeout(tick,GS.skip?0:28);
      } else {
        GS.typing=false; GS.waiting=true; ar.style.opacity='1';
        if(GS.auto||GS.skip) NV._autoT=setTimeout(()=>NV.advance(),GS.skip?40:2600);
      }
    };
    tick();
  },

  finishType(){
    clearTimeout(NV._typeT);
    const nt=$('#ntext'); if(nt)nt.textContent=GS.curText;
    GS.typing=false; GS.waiting=true;
    const ar=$('#narr'); if(ar)ar.style.opacity='1';
    if(GS.auto) NV._autoT=setTimeout(()=>NV.advance(),2600);
  },

  advance(){
    if(GS.typing){this.finishType();return;}
    if(GS.waiting){clearTimeout(NV._autoT);GS.waiting=false;GS.nIdx++;this.step();}
  },

  showChoice(opts){
    const box=$('#nchoices'),nb=$('#nbox'); if(!box)return;
    box.innerHTML=''; box.style.display='flex';
    const ar=$('#narr'); if(ar)ar.style.opacity='0';
    if(nb)nb.style.opacity='0.3';
    opts.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='nov-choice'; btn.textContent=opt.t;
      btn.style.animationDelay=(i*80)+'ms';
      btn.addEventListener('click',()=>{
        box.style.display='none'; box.innerHTML='';
        if(nb)nb.style.opacity='';
        if(opt.set)GS.unit.stats[opt.set.k]=Math.min(20,Math.max(0,GS.unit.stats[opt.set.k]+opt.set.v));
        if(opt.setb)GS.unit.bond=Math.min(20,Math.max(0,GS.unit.bond+opt.setb));
        if(opt.jmp){
          const idx=GS.nSteps.findIndex(x=>x.type==='lbl'&&x.id===opt.jmp);
          if(idx>=0)GS.nIdx=idx;
        }
        GS.nIdx++; NV.step();
      });
      box.appendChild(btn);
    });
  },

  showInput(s){
    const sc=$('#scr-novel'); if(!sc)return;
    const ov=document.createElement('div'); ov.className='nov-input-ov';
    ov.innerHTML='<div class="nov-input-box"><div class="nov-input-lbl">'+s.lbl+'</div>'
      +'<input class="nov-input-f" type="text" maxlength="8" placeholder="'+(s.ph||'入力')+'">'
      +'<div class="nov-input-hint">ENTER または クリックで確定</div></div>';
    sc.appendChild(ov);
    const inp=ov.querySelector('.nov-input-f'); inp.focus();
    const done=()=>{
      const v=inp.value.trim();
      if(s.key==='unit.nickname')GS.unit.nickname=v;
      ov.remove(); GS.nIdx++; NV.step();
    };
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter')done(); });
    ov.querySelector('.nov-input-hint').addEventListener('click',done);
  },

  toggleAuto(){
    GS.auto=!GS.auto; if(GS.auto)GS.skip=false;
    const ab=$('#nb-auto'); if(ab)ab.classList.toggle('on',GS.auto);
    const sb=$('#nb-skip'); if(sb)sb.classList.remove('on');
    if(GS.auto&&GS.waiting) NV._autoT=setTimeout(()=>NV.advance(),2600);
    else clearTimeout(NV._autoT);
  },

  toggleSkip(){
    GS.skip=!GS.skip; if(GS.skip)GS.auto=false;
    const sb=$('#nb-skip'); if(sb)sb.classList.toggle('on',GS.skip);
    const ab=$('#nb-auto'); if(ab)ab.classList.remove('on');
    if(GS.skip){ if(GS.typing)this.finishType(); else if(GS.waiting)this.advance(); }
  },

  showLog(){
    const h=$('#nhist'),b=$('#nhistbody'); if(!h||!b)return;
    b.innerHTML='';
    GS.history.forEach(hh=>{
      const d=document.createElement('div'); d.className='nov-hist-entry';
      if(hh.name){const n=document.createElement('span');n.className='nov-hist-nm';n.textContent=hh.name;d.appendChild(n);}
      const p=document.createElement('p'); p.textContent=hh.text; d.appendChild(p); b.appendChild(d);
    });
    b.scrollTop=b.scrollHeight; h.style.display='flex';
  },

  toCult(ph){
    const fov=$('#fov'); if(fov){fov.style.opacity='1';fov.style.pointerEvents='all';}
    setTimeout(()=>{
      const sc=$('#scr-novel');
      if(sc){sc.style.opacity='0';setTimeout(()=>sc.style.display='none',440);}
      setTimeout(()=>{ CULT.show(ph); if(fov){fov.style.opacity='0';fov.style.pointerEvents='none';} },450);
    },450);
  },

  toRoute(target){
    const fov=$('#fov'); if(fov){fov.style.opacity='1';fov.style.pointerEvents='all';}
    setTimeout(()=>{
      const sc=$('#scr-novel');
      if(sc){sc.style.opacity='0';setTimeout(()=>sc.style.display='none',440);}
      setTimeout(()=>{
        if(fov){fov.style.opacity='0';fov.style.pointerEvents='none';}
        GAME.startNovel(SCRIPTS[target]||SCRIPTS.end_L,()=>GAME.startNovel(SCRIPTS.epilogue));
      },460);
    },450);
  }
};

// ═══════════════════════════════════════════
//  CULTIVATION ENGINE
// ═══════════════════════════════════════════
const CULT={
  log:[],
  _mSteps:[],_mIdx:0,_mOnEnd:null,_mTyping:false,_mWaiting:false,_mText:'',_mT:null,

  init(){
    const g=$$();
    const sc=document.createElement('div'); sc.className='scr-cult'; sc.id='scr-cult';
    sc.innerHTML=
      '<div class="cult-hdr">'+
        '<span class="cult-sys">養殖場管理システム v4.2</span>'+
        '<div class="cult-wbar"><div class="cult-wfill" id="cwf"></div></div>'+
        '<span class="cult-wlbl" id="cwl">第1週/全16週</span>'+
      '</div>'+
      '<div class="cult-main">'+
        '<div class="cult-left">'+
          '<div class="cult-uid" id="cuid">個体番号: J-7</div>'+
          '<div class="cult-nick" id="cnick">呼称: ——</div>'+
          '<div class="cult-sil" id="csil"></div>'+
          '<div class="cult-stats" id="cstats"></div>'+
          '<div class="cult-pred" id="cpred"></div>'+
        '</div>'+
        '<div class="cult-right">'+
          '<div class="cult-ahdr">'+
            '<span class="cult-atitle">■ アクション選択</span>'+
            '<span class="cult-ap" id="cap">残 2/2</span>'+
          '</div>'+
          '<div class="cult-acts" id="cacts"></div>'+
          '<div class="cult-log"><div class="cult-log-t">— 育成ログ —</div><div id="clog"></div></div>'+
          '<button class="cult-nw" id="cnw">▶ 次の週へ</button>'+
        '</div>'+
      '</div>'+
      '<div class="mnov" id="mnov">'+
        '<div class="mnov-tag">D-3 行動観察記録</div>'+
        '<div class="nov-box" id="mnbox"><div class="nov-name" id="mnnm"></div>'+
        '<div class="nov-text" id="mntext"></div><div class="nov-arrow" id="mnarr">▼</div></div>'+
        '<div class="nov-choices" id="mnchoices"></div>'+
      '</div>';
    g.appendChild(sc);
    this._bind(sc);
  },

  _bind(sc){
    sc.querySelector('#cacts').addEventListener('click',e=>{
      const btn=e.target.closest('.cact'); if(!btn||btn.disabled)return;
      const id=btn.dataset.id;
      if(id==='talk'){ this.doTalk(); return; }
      const act=ACTIONS.find(a=>a.id===id); if(!act)return;
      act.apply(GS.unit.stats);
      this.addLog('['+act.cd+'] 実施完了。');
      GS.actLeft--;
      this.render();
      if(GS.actLeft<=0)this.onWeekDone();
    });
    sc.querySelector('#cnw').addEventListener('click',()=>{
      sc.querySelector('#cnw').style.display='none';
      GS.week++; GS.actLeft=2;
      this.render(); this.checkEvent();
    });
    sc.querySelector('#mnov').addEventListener('click',e=>{
      if(e.target.closest('#mnchoices'))return;
      this.mAdv();
    });
  },

  show(ph){
    let sc=$('#scr-cult');
    GS.cultPhase=ph;
    GS.week=ph===1?1:9;
    GS.actLeft=2; this.log=[];
    sc.style.display='flex';
    setTimeout(()=>sc.style.opacity='1',10);
    this.render(); this.checkEvent();
  },

  render(){
    const s=GS.unit.stats,b=GS.unit.bond;
    const maxW=8,w=GS.cultPhase===1?GS.week:GS.week-8;
    $('#cwf').style.width=((w-1)/maxW*100)+'%';
    $('#cwl').textContent='第'+GS.week+'週/全16週 (育成期'+GS.cultPhase+'/2)';
    $('#cuid').textContent='個体番号: '+GS.unit.id+'  担当: S-91';
    $('#cnick').textContent='呼称: '+(GS.unit.nickname||'——');
    // silhouette color based on dominant stat
    const dom=s.cog>=s.end&&s.cog>=s.emp?'#1e5090':s.end>=s.emp?'#7a2818':'#7a2860';
    $('#csil').innerHTML=makeSil(dom,86,144);
    // stats
    const defs=[
      {k:'cog',l:'認知能力',  c:'cog'},{k:'end',l:'身体耐久値',c:'end'},
      {k:'emp',l:'情動応答性',c:'emp'},{k:'com',l:'服従適合率',c:'com'},
      {k:'soc',l:'対人相互',  c:'soc'},{k:'bon',l:'担当親密度',c:'bon',isb:true}
    ];
    $('#cstats').innerHTML=defs.map(d=>{
      const v=d.isb?b:s[d.k];
      return '<div class="srow"><span class="slbl">'+d.l+'</span>'
        +'<div class="sbar"><div class="sfill '+d.c+'" style="width:'+(v/20*100)+'%"></div></div>'
        +'<span class="sval">'+v+'</span></div>';
    }).join('');
    if(GS.week>=5)$('#cpred').textContent='予測 ▷ '+getPred();
    else $('#cpred').textContent='';
    // actions
    $('#cacts').innerHTML=ACTIONS.map(a=>{
      const dis=GS.actLeft<=0?' disabled':'';
      return '<button class="cact" data-id="'+a.id+'"'+dis+'>'
        +'<div class="cact-top"><span class="cact-nm">'+a.nm+'</span><span class="cact-cd">['+a.cd+']</span></div>'
        +'<div class="cact-ds">'+a.ds+'</div>'
        +'<div class="cact-ef">'+a.ef+'</div></button>';
    }).join('');
    if(GS.actLeft<=0) ACTIONS.forEach((_,i)=>{ const b=$('#cacts').querySelectorAll('.cact')[i]; if(b)b.disabled=true; });
    $('#cap').textContent='残 '+GS.actLeft+'/2';
    const nw=$('#cnw'); if(nw) nw.style.display=GS.actLeft<=0?'block':'none';
    // log
    const le=$('#clog');
    le.innerHTML=this.log.slice(-14).map(l=>'<div class="cult-log-e'+(l.h?' hi':'')+'">'+l.t+'</div>').join('');
    le.scrollTop=le.scrollHeight;
  },

  addLog(t,h=false){ this.log.push({t,h}); },

  onWeekDone(){
    const endW=GS.cultPhase===1?8:16;
    if(GS.week>=endW){
      $('#cnw').style.display='none';
      setTimeout(()=>this.phaseEnd(),700);
    }
  },

  phaseEnd(){
    const sc=$('#scr-cult'); sc.style.opacity='0';
    setTimeout(()=>{
      sc.style.display='none';
      if(GS.cultPhase===1) GAME.startNovel(SCRIPTS.mid,()=>GAME.startCult(2));
      else {
        GS.classification=classify();
        GAME.startNovel(SCRIPTS.classification,()=>GAME.startNovel(SCRIPTS['end_'+GS.classification]||SCRIPTS.end_L,()=>GAME.startNovel(SCRIPTS.epilogue)));
      }
    },450);
  },

  checkEvent(){
    const ev={3:'ev_sky',7:'ev_talent',11:'ev_col',14:'ev_audit'}[GS.week];
    if(ev&&!GS.eventsDone.has(ev)){GS.eventsDone.add(ev);setTimeout(()=>this.runMini(EVENTS[ev]),400);}
  },

  runMini(steps,onEnd){
    this._mSteps=steps;this._mIdx=0;this._mOnEnd=onEnd||null;
    this._mTyping=false;this._mWaiting=false;
    $('#mnov').style.display='flex';
    this.mStep();
  },

  mStep(){
    const steps=this._mSteps;
    if(this._mIdx>=steps.length){this.mEnd();return;}
    const s=steps[this._mIdx];
    const next=()=>{this._mIdx++;this.mStep();};
    switch(s.type){
      case 'n': this.mText(null,ut(s.t)); break;
      case 'd': this.mText(s.c,ut(s.t)); break;
      case 'ch': this.mChoice(s.opts); break;
      case 'set': GS.unit.stats[s.k]=Math.min(20,Math.max(0,GS.unit.stats[s.k]+s.v)); next(); break;
      case 'setb': GS.unit.bond=Math.min(20,Math.max(0,GS.unit.bond+s.v)); next(); break;
      case 'log': this.addLog(s.t,s.h); next(); break;
      case 'lbl': next(); break;
      case 'jmp':{
        const idx=this._mSteps.findIndex(x=>x.type==='lbl'&&x.id===s.id);
        if(idx>=0)this._mIdx=idx; next(); break;
      }
      default: next();
    }
  },

  mText(charId,text){
    const ch=charId?CHARS[charId]:null;
    const nm=$('#mnnm'),tx=$('#mntext'),ar=$('#mnarr');
    if(!nm||!tx)return;
    const name=ch?charName(charId):''; const color=ch?ch.color:'';
    if(name){nm.textContent=name;nm.style.color=color;}
    else{nm.textContent='';nm.style.color='';}
    tx.textContent=''; ar.style.opacity='0';
    this._mTyping=true; this._mWaiting=false; this._mText=text;
    let i=0;
    const tick=()=>{
      if(i<text.length){tx.textContent=text.slice(0,++i);this._mT=setTimeout(tick,28);}
      else{this._mTyping=false;this._mWaiting=true;ar.style.opacity='1';}
    };
    tick();
  },

  mAdv(){
    if(this._mTyping){
      clearTimeout(this._mT);
      const tx=$('#mntext'); if(tx)tx.textContent=this._mText;
      this._mTyping=false; this._mWaiting=true;
      const ar=$('#mnarr'); if(ar)ar.style.opacity='1';
      return;
    }
    if(this._mWaiting){this._mWaiting=false;this._mIdx++;this.mStep();}
  },

  mChoice(opts){
    const box=$('#mnchoices'); if(!box)return;
    box.innerHTML=''; box.style.display='flex';
    const ar=$('#mnarr'); if(ar)ar.style.opacity='0';
    opts.forEach((opt,i)=>{
      const btn=document.createElement('button');
      btn.className='nov-choice'; btn.textContent=opt.t;
      btn.style.animationDelay=(i*70)+'ms';
      btn.addEventListener('click',()=>{
        box.style.display='none'; box.innerHTML='';
        if(opt.eff)opt.eff(GS.unit.stats,GS.unit);
        if(opt.jmp){const idx=this._mSteps.findIndex(x=>x.type==='lbl'&&x.id===opt.jmp);if(idx>=0)this._mIdx=idx;}
        this._mIdx++; this.mStep();
      });
      box.appendChild(btn);
    });
  },

  mEnd(){
    $('#mnov').style.display='none';
    const mc=$('#mnchoices'); if(mc){mc.innerHTML='';mc.style.display='none';}
    this.addLog('——[記録終了]——');
    this.render();
    if(this._mOnEnd)this._mOnEnd();
  },

  doTalk(){
    const scene=TALK_SCENES[Math.min(GS.talkIdx,TALK_SCENES.length-1)];
    GS.talkIdx++;
    this.runMini(scene,()=>{
      ACTIONS.find(a=>a.id==='talk').apply(GS.unit.stats);
      this.addLog('[D-3] 個別面談実施。担当親密度上昇。',true);
      GS.actLeft--;
      this.render();
      if(GS.actLeft<=0)this.onWeekDone();
    });
  }
};

//  GAME CONTROLLER
// ═══════════════════════════════════════════
const GAME={
  startNovel(steps,onEnd){
    GS.nSteps=steps;GS.nIdx=0;GS.nOnEnd=onEnd||null;
    NV.run(steps,onEnd);
  },
  startCult(ph){
    const nov=$('#scr-novel');
    if(nov){nov.style.opacity='0';setTimeout(()=>nov.style.display='none',450);}
    setTimeout(()=>CULT.show(ph),500);
  },
  init(){
    NV.init(); CULT.init();
    // title
    const g=$$();
    const title=document.createElement('div');
    title.className='nov-title';
    title.innerHTML='<div class="nov-title-inner">'
      +'<div class="nov-title-ey">DYSTOPIA / RAISING SIMULATION</div>'
      +'<h1 class="nov-title-h">養殖場</h1>'
      +'<p class="nov-title-sub">— あなたは育て、彼らは使われる —</p>'
      +'<button class="nov-title-start">はじめる</button>'
      +'</div>';
    g.appendChild(title);
    setTimeout(()=>title.style.opacity='1',100);
    title.querySelector('.nov-title-start').addEventListener('click',()=>{
      title.style.opacity='0';
      setTimeout(()=>{title.remove();GAME.startNovel(SCRIPTS.intro);},620);
    });
  }
};

GAME.init();
})();
